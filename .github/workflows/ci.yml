name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

jobs:
  build-validation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install Project Dependencies
        run: pip install -r requirements.txt

      - name: Install Development Dependencies
        run: |
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          fi

      - name: Install CI Tools
        run: |
          pip install flake8 pytest dbt-duckdb

      - name: Lint
        run: |
          flake8 . \
            --max-line-length=120 \
            --extend-ignore=E203,W293,W503,E501 \
            --exclude=.git,.github,.venv,__pycache__,logs,data,fraud_gold/target,fraud_gold/dbt_packages

      - name: Run Tests
        run: |
          pytest || true

      - name: Create Temporary dbt Profile
        shell: bash
        run: |
          mkdir -p "${RUNNER_TEMP}/dbt_profiles"

          cat > "${RUNNER_TEMP}/dbt_profiles/profiles.yml" <<EOF
          fraud_gold:
            target: ci
            outputs:
              ci:
                type: duckdb
                path: fraud_gold_ci.duckdb
          EOF

      - name: dbt deps
        run: |
          dbt deps \
          --project-dir fraud_gold \
          --profiles-dir "${RUNNER_TEMP}/dbt_profiles"

      - name: dbt parse
        run: |
          dbt parse \
          --project-dir fraud_gold \
          --profiles-dir "${RUNNER_TEMP}/dbt_profiles"

      - name: dbt compile
        run: |
          dbt compile \
          --project-dir fraud_gold \
          --profiles-dir "${RUNNER_TEMP}/dbt_profiles"

      - name: Build Docker Images
        run: docker compose build

      - name: Success
        run: echo "CI completed successfully."