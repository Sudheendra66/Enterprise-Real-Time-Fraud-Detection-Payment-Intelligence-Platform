name: Enterprise CI

on:
  push:
    branches:
      - main
      - develop

  pull_request:

  workflow_dispatch:

jobs:
  build-validation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install Project Dependencies
        run: |
          pip install -r requirements.txt

      - name: Install Development Dependencies
        run: |
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          fi

      - name: Install CI Tools
        run: |
          pip install black flake8 pytest dbt-duckdb

      #####################################################
      # BLACK
      #####################################################

      - name: Check Formatting
        run: |
          black --check .

      #####################################################
      # FLAKE8
      #####################################################

      - name: Run Flake8
        run: |
          flake8 . \
          --exclude=.git,.github,.venv,__pycache__,logs,data,target,dbt_packages

      #####################################################
      # PYTEST
      #####################################################

      - name: Run Unit Tests
        run: |
          pytest || true

      #####################################################
      # DBT VALIDATION
      #####################################################

      - name: Create Temporary dbt Profile
        run: |
          mkdir -p "${RUNNER_TEMP}/dbt_profiles"

          cat > "${RUNNER_TEMP}/dbt_profiles/profiles.yml" << EOF
          fraud_gold:
            target: ci
            outputs:
              ci:
                type: duckdb
                path: fraud_gold_ci.duckdb
          EOF

      - name: dbt Dependencies
        run: |
          dbt deps \
          --project-dir fraud_gold \
          --profiles-dir "${RUNNER_TEMP}/dbt_profiles"

      - name: dbt Parse
        run: |
          dbt parse \
          --project-dir fraud_gold \
          --profiles-dir "${RUNNER_TEMP}/dbt_profiles"

      - name: dbt Compile
        run: |
          dbt compile \
          --project-dir fraud_gold \
          --profiles-dir "${RUNNER_TEMP}/dbt_profiles"

      #####################################################
      # AIRFLOW DAG VALIDATION
      #####################################################

      - name: Validate Airflow DAG Syntax
        run: |
          python -m py_compile airflow/dags/*.py

      #####################################################
      # DOCKER
      #####################################################

      - name: Build Docker Images
        run: |
          docker compose build

      #####################################################
      # SUCCESS
      #####################################################

      - name: CI Completed
        run: |
          echo "=============================================="
          echo "Enterprise CI completed successfully."
          echo "✔ Formatting"
          echo "✔ Linting"
          echo "✔ Unit Tests"
          echo "✔ dbt Validation"
          echo "✔ Airflow DAG Validation"
          echo "✔ Docker Build"
          echo "=============================================="