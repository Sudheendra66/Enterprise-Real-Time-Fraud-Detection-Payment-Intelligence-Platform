name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: flake8 . --max-line-length=120 --extend-ignore=E203,W293,W503,E501 --exclude=.git,.github,.venv,__pycache__,logs,data,batch/source,batch/landing,fraud_gold/target,fraud_gold/dbt_packages || true
      - run: black --check --diff . --exclude="\.venv/|\.git/|__pycache__/|logs/|data/|batch/|fraud_gold/" || true
      - run: isort --check-only --diff . --skip-glob=".venv/*" --skip-glob="__pycache__/*" --skip-glob="logs/*" --skip-glob="data/*" --skip-glob="batch/*" --skip-glob="fraud_gold/*" --skip-glob="streamlit_dashboard/*" || true

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: pytest tests/ -v --tb=short || true

  dbt-validate:
    name: dbt Model Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install dbt-duckdb
      - name: Create dbt Profile
        run: |
          mkdir -p /home/runner/work/dbt_profiles
          cat > /home/runner/work/dbt_profiles/profiles.yml <<'EOF'
          fraud_gold:
            target: ci
            outputs:
              ci:
                type: duckdb
                path: fraud_gold_ci.duckdb
                threads: 1
          EOF
      - run: dbt deps --project-dir fraud_gold --profiles-dir /home/runner/work/dbt_profiles || true
      - run: dbt parse --project-dir fraud_gold --profiles-dir /home/runner/work/dbt_profiles || true